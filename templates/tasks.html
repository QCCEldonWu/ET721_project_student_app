{% extends 'base.html' %}

{% block content %}

<h2>To-Do List</h2>

<form method="POST">
    <input type="text" name="title" placeholder="Enter Task Here" required>

    <select name="category">
        <option>Academic</option>
        <option>Homework</option>
        <option>Personal</option>
    </select>

    <button type="submit">Add Task</button>
</form>

<hr>

{% for task in tasks %}

<div class="task-box">
    <h3>{{ task['title'] }}</h3>
    <p>Category: {{ task['category'] }}</p>

    {% if task['completed'] == 0 %}
        <a href="{{ url_for('complete_task', id=task['id']) }}">Complete</a>
    {% else %}
        <strong>Completed</strong>
    {% endif %}

    <a href="{{ url_for('delete_task', id=task['id']) }}">Delete</a>
</div>

{% endfor %}

{% endblock %}
