{% extends 'base.html' %}

{% block content %}

<h2>Blog Posts</h2>

<form method="POST">
    <input type="text" name="title" placeholder="Blog Title" required>

    <textarea name="content" placeholder="Write your blog here..." required></textarea>

    <button type="submit">Publish</button>
</form>

<hr>

{% for blog in blogs %}

<div class="blog-box">
    <h3>{{ blog['title'] }}</h3>
    <p>{{ blog['content'] }}</p>

    <a href="{{ url_for('delete_blog', id=blog['id']) }}">Delete</a>
</div>

{% endfor %}

{% endblock %}
